name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A5C88C: ${{ secrets.A5C88C }}
          BB8571: ${{ secrets.BB8571 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A5C88C', '')
          bm = os.environ.get('BB8571', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 35e97bc2b5ea5972579d36c87825897b690bd5b2 -->', gm)
              s2 = s2.replace('<!-- c0ff652c7f9db9e92a5193b0cf1708f8c0e58fe464c4fddc -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
